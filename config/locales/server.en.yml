en:
  site_settings:
    private_topics_enabled: "Enable Private Topics plugin"
    private_topics_permitted_groups: "Always show topics started by a member of these groups"
    private_topics_allowed_user_manager_groups: "Groups allowed to manage per-topic additional viewers"
    private_topics_admin_sees_all: "Allow admin users to see all topics"
    private_topics_send_access_granted_notifications: "Send a system DM when a user is newly granted topic access"
  private_topics:
    access_levels:
      read: "read only"
      reply: "read and reply"
