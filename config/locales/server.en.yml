      access_granted:
        subject: "You were granted access to \"%{topic_title}\""
        body: "%{actor_username} granted you %{access_level} access to [%{topic_title}](%{topic_url})."
    errors:
      allowed_users_storage_unavailable: "Topic access lists are temporarily unavailable until the plugin migration has been run."
      invalid_access_level: "The provided access level is invalid."
      invalid_user_ids: "These user ids could not be found: %{user_ids}"
      invalid_users: "These usernames could not be found: %{usernames}"
      invalid_group_ids: "These group ids could not be found: %{group_ids}"
      invalid_groups: "These groups could not be found: %{group_names}"
      unauthorized_groups: "You can only grant access to groups you belong to: %{group_names}"
      private_category_required: "Topic access lists can only be used in categories with private topics enabled."
      users_without_category_access: "These users cannot access the topic category: %{usernames}"
